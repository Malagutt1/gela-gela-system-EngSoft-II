<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Gela-Gela | Backup</title>

    <link rel="stylesheet" href="../ASSETS/CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="layout">

        <aside class="sidebar">
            <div class="logo-area">
                <img src="../ASSETS/IMG/icon.png">
                <span>Gela-Gela</span>
            </div>

            <nav>
                <a href="../"><i class="fa-solid fa-cart-shopping"></i> Nova Venda</a>
                <a href="../DASHBOARD/"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="../PRODUTOS/"><i class="fa-solid fa-boxes-stacked"></i> Produtos</a>
                <a href="../CLIENTES/"><i class="fa-solid fa-users"></i> Clientes</a>
                <a href="../FORNECEDORES/"><i class="fa-solid fa-truck"></i> Fornecedores</a>
                <a href="../PROMO/"><i class="fa-solid fa-tags"></i> Promoções</a>
                <a href="../USUARIO/"><i class="fa-solid fa-user-shield"></i> Usuários</a>
                <a href="./" class="active"><i class="fa-solid fa-database"></i> Backup</a>
                <a href="../LOGS/"><i class="fa-solid fa-file-lines"></i> Logs</a>
                <a href="../RELATORIO/"><i class="fa-solid fa-chart-pie"></i> Relatórios</a>
            </nav>
        </aside>

        <main class="content">

            <header class="topbar">
                <h1>Backup do Sistema</h1>
            </header>

            <section class="main">

                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <p><strong>Último backup:</strong> <span id="ultimo-backup">--</span></p>

                    <button class="btn" onclick="fazerBackup()">
                        <i class="fa fa-database"></i> Gerar Backup
                    </button>
                </div>

                <div class="box">
                    <table>
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Tipo</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>

                        <tbody id="tabela-backup">

                            <tr>
                                <td>30/03/2026 14:32</td>
                                <td><span class="tag-resumo">Automático</span></td>
                                <td><span class="badge ok">Sucesso</span></td>
                                <td>
                                    <button class="btn-icon" onclick="baixarBackup()">
                                        <i class="fa fa-download"></i>
                                    </button>
                                </td>
                            </tr>

                        </tbody>
                    </table>
                </div>

            </section>
        </main>
    </div>

    <script src="../ASSETS/JS/app.js"></script>

</body>

</html>
