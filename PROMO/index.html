<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gela-Gela | Promoções</title>

    <link rel="stylesheet" href="../ASSETS/CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="logo-area">
            <img src="../ASSETS/IMG/icon.png" alt="Logo">
            <span>Gela-Gela</span>
        </div>

        <nav>
            <a href="../"><i class="fa-solid fa-cart-shopping"></i> Nova Venda</a>
                <a href="../DASHBOARD/"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="../PRODUTOS/"><i class="fa-solid fa-boxes-stacked"></i> Produtos</a>
                <a href="../CLIENTES/"><i class="fa-solid fa-users"></i> Clientes</a>
                <a href="../FORNECEDORES/"><i class="fa-solid fa-truck"></i> Fornecedores</a>
                <a href="./" class="active"><i class="fa-solid fa-tags"></i> Promoções</a>
                <a href="../USUARIO/"><i class="fa-solid fa-user-shield"></i> Usuários</a>
                <a href="../BACKUP/"><i class="fa-solid fa-database"></i> Backup</a>
                <a href="../LOGS/"><i class="fa-solid fa-file-lines"></i> Logs</a>
                <a href="../RELATORIO/"><i class="fa-solid fa-chart-pie"></i> Relatórios</a>
        </nav>
    </aside>

    <!-- CONTEÚDO -->
    <main class="content">

        <header class="topbar">
            <button class="menu-btn" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
            <h1>Gestão de Promoções</h1>
        </header>

        <section class="main">

            <div style="display:flex; justify-content:space-between; margin-bottom:25px;">
                <h2><i class="fa-solid fa-tags"></i> Promoções</h2>

                <button class="btn" onclick="abrirModalPromo()">
                    <i class="fa-solid fa-plus"></i> Nova Promoção
                </button>
            </div>

            <!-- TABELA -->
            <div class="box">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Desconto</th>
                                <th>Produto</th>
                                <th>Validade</th>
                                <th>Ações</th>
                            </tr>
                        </thead>

                        <tbody id="tabela-promocoes">

                            <tr>
                                <td>Promo Açaí</td>
                                <td>10%</td>
                                <td>Açaí Tradicional</td>
                                <td>30/04/2026</td>
                                <td>
                                    <button class="btn-icon" onclick="alert('Editar (simulação)')">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>
                                    <button class="btn-icon danger" onclick="excluirPromo(this)">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </td>
                            </tr>

                            <tr>
                                <td>Combo Família</td>
                                <td>15%</td>
                                <td>Todos os Sabores</td>
                                <td>15/05/2026</td>
                                <td>
                                    <button class="btn-icon">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>
                                    <button class="btn-icon danger" onclick="excluirPromo(this)">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </td>
                            </tr>

                        </tbody>
                    </table>
                </div>
            </div>

        </section>
    </main>
</div>

<!-- MODAL -->
<div id="modalPromo" class="modal">
    <div class="modal-content box">
        <h3>Cadastrar Promoção</h3>

        <form onsubmit="salvarPromo(event)">
            <div class="grid-form">

                <div class="form-group">
                    <label>Nome da Promoção</label>
                    <input type="text" id="promo-nome" required>
                </div>

                <div class="form-group">
                    <label>Desconto (%)</label>
                    <input type="number" id="promo-desc" required>
                </div>

                <div class="form-group">
                    <label>Produto</label>
                    <input type="text" id="promo-produto">
                </div>

                <div class="form-group">
                    <label>Validade</label>
                    <input type="date" id="promo-validade">
                </div>

            </div>

            <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:10px;">
                <button type="button" class="btn btn-secondary" onclick="fecharModalPromo()">Cancelar</button>
                <button type="submit" class="btn">Salvar</button>
            </div>
        </form>
    </div>
</div>

<script src="../ASSETS/JS/app.js"></script>

</body>
</html>
