<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gela-Gela | Acesso ao Sistema</title>
    <link rel="stylesheet" href="ASSETS/CSS/style-login.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-brand">
            <i class="fa-solid fa-ice-cream brand-icon"></i>
            <h1>Gela-Gela</h1>
            <p>Sistema de Gestão e Vendas para Sorveteria e Açaiteria</p>
        </div>

        <div class="login-form-container">
            <h2>Bem-vindo de volta!</h2>
            <p>Insira suas credenciais para acessar o painel.</p>

            <form method="POST" action="">
                
                <div class="input-group">
                    <label for="usuario">Usuário ou E-mail</label>
                    <div class="input-wrapper">
                        <input type="text" id="usuario" name="usuario" placeholder="Ex: funcionario@gelagela.com" required>
                        <i class="fa fa-user"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="senha">Senha de Acesso</label>
                    <div class="input-wrapper">
                        <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                        <i class="fa fa-lock"></i>
                    </div>
                </div>

                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox" name="lembrar">
                        <span>Lembrar minhas credenciais</span>
                    </label>
                </div>

                <button type="submit" class="btn-login">
                    Entrar no Sistema <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>

            </form>

            <div class="login-footer">
                &copy; 2026 Gela-Gela. Acesso restrito a colaboradores.
            </div>
        </div>
    </div>

</body>
</html>
